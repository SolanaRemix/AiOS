apiVersion: apps/v1
kind: Deployment
metadata:
  name: aios-web
  namespace: aios
  labels:
    app: aios-web
    app.kubernetes.io/name: aios-web
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: aios-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aios-web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: aios-web
    spec:
      terminationGracePeriodSeconds: 30
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [aios-web]
                topologyKey: kubernetes.io/hostname
      containers:
        - name: web
          image: ghcr.io/your-org/aios-web:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: NEXT_TELEMETRY_DISABLED
              value: "1"
            - name: NEXT_PUBLIC_API_URL
              value: https://api.aios.platform
            - name: API_URL
              value: http://aios-api:4000
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1001
            capabilities:
              drop: [ALL]
      imagePullSecrets:
        - name: ghcr-secret
---
apiVersion: v1
kind: Service
metadata:
  name: aios-web
  namespace: aios
  labels:
    app: aios-web
spec:
  type: ClusterIP
  selector:
    app: aios-web
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
