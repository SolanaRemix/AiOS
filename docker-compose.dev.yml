version: "3.9"

# Development overrides – adds hot-reload volume mounts
services:
  api:
    build:
      target: builder
    command: npm run dev --workspace=apps/api
    environment:
      NODE_ENV: development
    volumes:
      - ./apps/api/src:/app/apps/api/src:delegated
      - ./apps/api/prisma:/app/apps/api/prisma:delegated

  web:
    build:
      target: builder
    command: npm run dev --workspace=apps/web
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:4000
    volumes:
      - ./apps/web/src:/app/apps/web/src:delegated
      - ./apps/web/app:/app/apps/web/app:delegated
      - ./apps/web/public:/app/apps/web/public:delegated
      # Prevent overwriting node_modules
      - /app/apps/web/node_modules

  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"
